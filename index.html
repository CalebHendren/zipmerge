<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZipMerge</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Consolas&display=swap" rel="stylesheet">

    <!-- Third-party libraries -->
    <script src="https://unpkg.com/pdf-lib@^1.11.2"></script>
    <script src="https://unpkg.com/downloadjs@1.4.7"></script>
    <!-- SheetJS for Excel support in the ID processor.
         Remove this tag if features.enableExcel in js/config.js is false. -->
    <script src="https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>
<button id="themeToggle" class="theme-toggle" type="button">Toggle Theme</button>

<!-- Student ID Processor (on top, per request) -->
<div class="container">
    <h1 id="idProcessorTitle">Student ID Processor for ZipGrade</h1>
    <p class="subtitle" id="idProcessorSubtitle"></p>

    <div class="input-group drop-zone">
        <label for="studentIdFile">Student IDs file (.csv, .xlsx, .xls):</label>
        <input type="file" id="studentIdFile">
        <div id="studentIdFileInfo" class="file-info">No file selected</div>
    </div>

    <button id="processIdsBtn" type="button" disabled>Process IDs</button>
    <div id="idStatus" class="status"></div>
</div>

<!-- Bubble Sheet + Written Sheet Merger -->
<div class="container">
    <h1 id="mergerTitle">Bubble Sheet + Written Sheet Merger</h1>
    <a id="link-sourceCode" class="project-link" target="_blank" rel="noopener">Source Code</a>
    <a id="link-tutorial" class="project-link" target="_blank" rel="noopener">Tutorial</a>
    <a id="link-examples" class="project-link" target="_blank" rel="noopener">Example Input/Output</a>

    <div class="input-group drop-zone">
        <label for="bubbleSheet">Bubble Sheets (PDF only):</label>
        <input type="file" id="bubbleSheet">
        <div id="bubbleSheetInfo" class="file-info">No file selected</div>
    </div>

    <div class="input-group drop-zone">
        <label for="writtenSheet">Written Answer Sheets (PDF only):</label>
        <input type="file" id="writtenSheet">
        <div id="writtenSheetInfo" class="file-info">No file selected</div>
    </div>

    <button id="processBtn" type="button" disabled>Merge PDFs</button>

    <div class="progress-container">
        <div class="progress-label">
            <span>Processing Progress</span>
            <span id="progressPercent">0%</span>
        </div>
        <div class="progress">
            <div id="progressBar" class="progress-bar"></div>
        </div>
    </div>
    <div id="status" class="status"></div>
</div>

<!-- App scripts (config first; main last) -->
<script src="js/config.js"></script>
<script src="js/file-utils.js"></script>
<script src="js/theme.js"></script>
<script src="js/id-processor.js"></script>
<script src="js/pdf-merger.js"></script>
<script src="js/main.js"></script>
</body>
</html>
